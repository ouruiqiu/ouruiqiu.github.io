<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法十五</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 10px;
        }
        h1 {
            color: #2c3e50;
            margin: 10px 0;
            font-size: clamp(20px, 5vw, 32px);
        }
        .game-wrapper {
            display: flex;
            gap: clamp(10px, 2vw, 30px);
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 620px;
        }
        .player-area {
            width: clamp(80px, 18vw, 120px);
            min-height: 160px;
            border: 2px dashed;
            padding: 8px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: clamp(12px, 2.5vw, 16px);
            font-weight: bold;
        }
        #player1Area {
            border-color: #e74c3c;
        }
        #player2Area {
            border-color: #3498db;
        }
        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(6px, 1.5vw, 10px);
            margin: 10px 0;
            width: clamp(180px, 50vw, 260px);
            aspect-ratio: 1;
        }
        .card {
            background-color: #4CAF50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(18px, 4vw, 28px);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            user-select: none;
            width: 100%;
            aspect-ratio: 1;
        }
        .card:hover:not(.disabled) {
            background-color: #45a049;
        }
        .card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .status {
            font-size: clamp(16px, 3.5vw, 24px);
            margin: 8px 0;
            color: #333;
            text-align: center;
        }
        button {
            padding: 8px 18px;
            font-size: clamp(14px, 3vw, 16px);
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 8px;
        }
        button:hover {
            background-color: #007a9e;
        }
        .rules {
            background-color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            margin: 10px 0;
            max-width: 400px;
            width: 100%;
            font-size: clamp(12px, 2.5vw, 14px);
        }
        .rules h3 {
            margin: 0 0 8px 0;
            font-size: clamp(14px, 3vw, 16px);
        }
        .rules ul {
            margin: 0;
            padding-left: 20px;
        }
        .rules li {
            margin: 4px 0;
        }
        @keyframes victoryJump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
        .victory-message {
            font-size: clamp(24px, 6vw, 36px);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: victoryJump 0.5s ease infinite;
            margin: 10px 0;
            text-align: center;
        }
        .player1-color { color: #e74c3c; }
        .player2-color { color: #3498db; }
    </style>
</head>
<body>
    <h1>魔法十五</h1>
    <div class="rules">
        <h3>游戏规则：</h3>
        <ul>
            <li>1. 玩家轮流选择数字卡</li>
            <li>2. 先收集3张和为15的卡牌者胜</li>
            <li>3. 数字卡取完未分胜负则为平局</li>
        </ul>
    </div>
    <div class="status" id="status">当前回合：🔥烈焰巫师</div>
    <div id="victoryMessage"></div>

    <div class="game-wrapper">
        <div class="player-area" id="player1Area"><div>🔥烈焰巫师</div></div>
        <div class="game-container" id="gameContainer"></div>
        <div class="player-area" id="player2Area"><div>❄️寒冰法师</div></div>
    </div>

    <button onclick="restartGame()">重新开始</button>

    <script>
        const players = {
            1: {
                name: "🔥烈焰巫师",
                areaId: "player1Area",
                colorClass: "player1-color",
                numbers: []
            },
            2: {
                name: "❄️寒冰法师",
                areaId: "player2Area",
                colorClass: "player2-color",
                numbers: []
            }
        };

        let currentPlayer = 1;
        let gameEnded = false;

        function initGame() {
            const container = document.getElementById('gameContainer');
            container.innerHTML = '';
            
            const numbers = Array.from({length:9}, (_,i)=>i+1).sort(() => Math.random()-0.5);
            
            numbers.forEach(num => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = num;
                card.addEventListener('click', () => selectCard(num, card));
                container.appendChild(card);
            });
        }

        function selectCard(number, cardElement) {
            if (gameEnded || cardElement.classList.contains('disabled')) return;

            const currentPlayerObj = players[currentPlayer];
            
            cardElement.classList.add('disabled');
            const targetArea = document.getElementById(currentPlayerObj.areaId);

            targetArea.appendChild(cardElement);

            currentPlayerObj.numbers.push(number);
            
            if (checkWin(currentPlayerObj.numbers)) {
                showVictory(currentPlayerObj);
                return;
            }

            if (players[1].numbers.length + players[2].numbers.length === 9) {
                endGame('✨ 平局！势均力敌！✨');
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateStatus();
        }

        function checkWin(numbers) {
            if (numbers.length < 3) return false;
            
            for (let i = 0; i < numbers.length; i++) {
                for (let j = i + 1; j < numbers.length; j++) {
                    for (let k = j + 1; k < numbers.length; k++) {
                        if (numbers[i] + numbers[j] + numbers[k] === 15) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function showVictory(winner) {
            const victoryElement = document.getElementById('victoryMessage');
            victoryElement.innerHTML = `
                <div class="victory-message ${winner.colorClass}">
                    🎉 ${winner.name} 获得胜利！🎉
                </div>
            `;
            endGame();
        }

        function endGame(message) {
            gameEnded = true;
            if (message) {
                document.getElementById('victoryMessage').innerHTML = 
                    `<div class="victory-message">${message}</div>`;
            }
            document.querySelectorAll('.card').forEach(card => {
                card.classList.add('disabled');
            });
        }

        function updateStatus() {
            document.getElementById('status').textContent = 
                `当前回合：${players[currentPlayer].name}`;
        }

        function restartGame() {
            currentPlayer = 1;
            players[1].numbers = [];
            players[2].numbers = [];
            document.getElementById('player1Area').innerHTML = '<div>🔥烈焰巫师</div>';
            document.getElementById('player2Area').innerHTML = '<div>❄️寒冰法师</div>';
            document.getElementById('victoryMessage').innerHTML = '';
            gameEnded = false;
            updateStatus();
            initGame();
        }

        initGame();
    </script>
</body>
</html>
